<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cédric 40 & Manon 10 - Double Anniversaire</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div id="overlay">
        <div class="overlay-content">
            <h2 class="prenom fete-prenom">CÉDRIC 40</h2>
            <h2 class="prenom fete-prenom">& MANON 10</h2>
            <p>Une double décennie de bonheur à fêter !</p>
            <button id="enter-btn">DÉCOUVRIR L'INVITATION</button>
        </div>
    </div>

    <div id="main-invitation" class="invitation-container hidden">
        
        <img src="invitation-image.png" alt="Invitation Cédric 40 Manon 10" class="invitation-img" />

        <section id="countdown-reserve-section">
            
            <div id="countdown-container">
                <h2>Le grand saut dans...</h2>
                <div id="countdown">
                    <div class="time-box">
                        <span id="days">00</span>
                        <p>Jours</p>
                    </div>
                    <div class="time-box">
                        <span id="hours">00</span>
                        <p>Heures</p>
                    </div>
                    <div class="time-box">
                        <span id="minutes">00</span>
                        <p>Min</p>
                    </div>
                    <div class="time-box">
                        <span id="seconds">00</span>
                        <p>Sec</p>
                    </div>
                </div>
            </div>

            <div id="reservation-container">
                <h2>Avez-vous bloqué la date ?</h2>
                <p>Confirmez votre présence via le bouton ci-dessous.</p>
                <a href="https://forms.gle/WhZ9JNAK6UGndsoy5" target="_blank" class="btn-rsvp">
                    INDIQUER NOTRE PRÉSENCE
                </a>
            </div>

        </section>

    </div>

    <audio id="musique-fete" loop>
        <source src="musique-fete.mp3" type="audio/mpeg">
        Votre navigateur ne supporte pas l'élément audio.
    </audio>

    <button id="music-control" class="music-btn pause hidden">
        <span class="icon-music">🎵</span>
        <span class="music-text">PAUSE AMBIANCE</span>
    </button>

    <script src="script.js"></script>
</body>
</html>
